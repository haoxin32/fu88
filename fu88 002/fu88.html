        /* 1. Hiệu ứng tưng tưng */
        @keyframes bounceEffect {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* 2. Hiệu ứng lắc lắc */
        @keyframes shakeEffect {
            0%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(-10deg); }
            20% { transform: rotate(10deg); }
            30% { transform: rotate(-10deg); }
            40% { transform: rotate(10deg); }
            50%, 100% { transform: rotate(0deg); } 
        }

        /* 3. Áp dụng hiệu ứng */
        .side-btn.gift {
            animation: bounceEffect 1.5s infinite ease-in-out;
        }

        .side-btn.line {
            transform-origin: center center; 
            animation: shakeEffect 2.5s infinite ease-in-out;
        }

        /* 1. CSS cho nút Đăng ký */
        .btn-register {
            position: relative;
            overflow: hidden;
            animation: pulse-glow 2s infinite;
        }
        .btn-register::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shine-sweep 3s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.7); }
            70% { box-shadow: 0 0 15px 15px rgba(255, 204, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); }
        }
        @keyframes shine-sweep {
            0% { left: -100%; top: -100%; }
            20% { left: 100%; top: 100%; }
            100% { left: 100%; top: 100%; }
        }

        /* 2. CSS cho Logo lơ lửng */
        .logo-floating {
            animation: float-up-down 4s ease-in-out infinite;
        }
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
         .led-logo-wrapper {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 130px;  /* Chiều rộng tổng thể (bao gồm cả vòng LED) */
    height: 130px; /* Chiều cao tổng thể */
    border-radius: 50%;
    overflow: hidden; /* Cắt bỏ phần ánh sáng thừa ra ngoài hình tròn */
    padding: 4px; /* Độ dày của vòng LED (Thay đổi số này để vòng dày/mỏng hơn) */
    
    /* Tùy chọn: Kết hợp với hiệu ứng bay lơ lửng lúc nãy */
    animation: float-up-down 4s ease-in-out infinite; 
}

/* 2. Dải màu LED xoay tròn ở lớp nền */
.led-logo-wrapper::before {
    content: '';
    position: absolute;
    width: 150%; 
    height: 150%;
    /* Các màu sắc của đèn LED (Hồng -> Tím -> Xanh -> Hồng) */
    background: conic-gradient(
        from 0deg,
        #ff00a0,
        #7a00ff,
        #00d2ff,
        #ff00a0
    );
    /* Thời gian 1 vòng quay là 2.5 giây */
    animation: spin-led 2.5s linear infinite; 
}

/* 3. Lớp chặn ánh sáng ở giữa (Chỉ để hở ra phần viền) */
.led-logo-wrapper::after {
    content: '';
    position: absolute;
    inset: 4px; /* Bằng đúng với padding ở trên */
    background-color: #2b1055; /* Màu nền phía sau logo (Màu tím của web bạn) */
    border-radius: 50%;
}

/* 4. Hình ảnh Logo hiển thị trên cùng */
.logo-inner {
    position: relative;
    z-index: 10; /* Đẩy logo lên lớp cao nhất để không bị LED che lấp */
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

/* 5. Chuyển động xoay vòng */
@keyframes spin-led {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.modal-content {
   /* Hiệu ứng làm mờ cảnh phía sau (chỉ hỗ trợ trên các trình duyệt mới) */
    backdrop-filter: blur(8px); 
    -webkit-backdrop-filter: blur(8px);
    
    /* Giữ nguyên các thông số cũ của bạn */
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    position: relative;
    
    /* Viền mỏng mờ */
    border: 1px solid rgba(255, 255, 255, 0.2); 
}
/* Ép modal thành nền tối và có độ trong suốt */

        box-shadow: 0 0 20px rgba(0,0,0,0.5) !important; /* Đổ bóng cho đẹp */
    }

        /* --- Footer Marquee --- */

        /* --- Pop-up Modal --- */

            width: 100%;

        /* --- Animations --- */
